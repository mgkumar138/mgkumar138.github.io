# ============================================================
# SITE CONFIGURATION — mgkumar138.github.io
# ============================================================
# To update personal info: edit the "author:" block below.
# To update navigation: edit _data/navigation.yml
# ============================================================

# --- Basic settings ---
locale          : "en-US"
site_theme      : "mint"   # theme: default | air | sunrise | mint | dirt | contrast
title           : "M Ganesh Kumar"
title_separator : "-"
name            : &name "M Ganesh Kumar"
description     : &description "Computational Neuroscientist · Postdoctoral Fellow, MPI for Biological Cybernetics"
url             : https://mgkumar138.github.io
baseurl         : ""
repository      : "mgkumar138/mgkumar138.github.io"

# --- Author sidebar ---
# Blank fields are hidden automatically.
author:
  avatar        : "ganesh_informal_square.jpg"   # filename in /images/
  name          : "M Ganesh Kumar, Ph.D."
  bio           : "Postdoctoral Fellow"
  location      : "Tübingen, Germany"
  employer      : "MPI for Biological Cybernetics"
  email         : "m_ganeshkumar@u.nus.edu"

  # Academic profiles
  googlescholar : "https://scholar.google.com/citations?user=sFfy1q4AAAAJ&hl=en"
  orcid         : "https://orcid.org/0000-0001-5559-6428"

  # Code & social
  github        : "mgkumar138"
  linkedin      : "M-Ganesh-Kumar"
  bluesky       : "mgkumar138.bsky.social"
  twitter       : "mgkumar138"

# --- Analytics (add your Google Analytics ID here when ready) ---
analytics:
  provider : "false"
  google:
    tracking_id :

# --- Reading / build ---
include:
  - _pages
  - files
exclude:
  - .asset-cache
  - .bundle
  - .github
  - .sass-cache
  - node_modules
  - vendor
  - Gemfile
  - LICENSE
  - README.md
  - package.json
keep_files:
  - .git
encoding       : "utf-8"
markdown_ext   : "markdown,mkdown,mkdn,mkd,md"

# --- Markdown / syntax ---
markdown    : kramdown
highlighter : rouge
lsi         : false
excerpt_separator: "\n\n"
incremental : false
kramdown:
  input          : GFM
  hard_wrap      : false
  auto_ids       : true
  toc_levels     : 1..6
  smart_quotes   : lsquo,rsquo,ldquo,rdquo
  enable_coderay : false

# --- Pages defaults ---
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout       : single
      author_profile: true

# --- Sass ---
sass:
  sass_dir : _sass
  style    : compressed

# --- Output ---
permalink  : /:categories/:title/
timezone   : Etc/UTC

# --- Plugins ---
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from

whitelist:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from

# --- HTML Compression ---
compress_html:
  clippings: all
  ignore:
    envs: development
